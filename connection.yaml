connections:
  src:
    type: mysql
    host: "mysql-host"
    port: 3009
    database: "mysql_db"
    username: "mysql_user"
    password: "mysql_password"
    proxy:
      type: socks
      host: "socksproxy.aaa.corp.services"
      port: 1080

  trg:
    type: mssql
    driver: "ODBC Driver 17 for SQL Server"
    host: "mssql-host"
    port: 1433
    database: "mssql_db"
    username: "mssql_ser"
    password: "mssql_password"
    proxy:
      type: socks
      host: "127.0.0.1"
      port: 1234
    encrypt: true
    trust_server_certificate: true
    login_timeout: 30
