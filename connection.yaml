pyconnectors:
  src:
    type: MySQL
    connector: MySqlConnector
  trg:
    type: MSSQL
    connector: SqlServerConnector

connections:
  src:
    host: "mysql_host"
    port: 3009
    database: "mysql_db"
    username: "mysql_user"
    password: "mysql_password"
    proxy:
      type: socks
      host: "socksproxy.aaa.home.services"
      port: 1080

  trg:
    driver: "ODBC Driver 17 for SQL Server"
    host: "mssql_host"
    port: 1433
    database: "mssql_db"
    username: "mssql_user"
    password: "mssql_password"
    encrypt: true
    trust_server_certificate: true
    login_timeout: 30    
    proxy:
      type: socks
      host: "127.0.0.1"
      port: 1234
